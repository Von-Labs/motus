name: CD - Supabase Development

on:
  push:
    branches: [ "staging" ]

  workflow_dispatch:

jobs:
  migrate-up:
    runs-on: ubuntu-latest
    environment: staging

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_DEV_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DEV_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_DEV_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: supabase link --project-ref $SUPABASE_PROJECT_ID
      - run: supabase db push
      - run: |
          if [ -d supabase/functions ] && [ "$(ls -A supabase/functions)" ]; then
            supabase functions deploy
          else
            echo "No Supabase functions found. Skipping deploy."
          fi
